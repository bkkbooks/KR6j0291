body:
  text: 三藏法師寶思惟奉詔譯根本呪曰那謨喝囉怛曩怛囉夜也二那摩阿唎也三婆嚕吉帝說長引聲婆囉吔三菩提薩埵婆吧四摩訶薩埵婆也五摩訶迦嚧尼迦吔六怛姪他七唵八斫迦羅九靺哩底二合十震哆摩尼十一摩訶鉢特二合十三迷嚕嚕底瑟吒二合十四鉢羅十五阿羯贈哩灑吔虎吽二合十六泮吒二合半聲十七娑引嚩訶十八若有善男子善女人持誦此呪若每日平旦嚼楊枝始念誦若誦此呪滿十萬聖如意輪菩薩現身與所求願凡誦此呪不簡在家出家飲酒食肉有妻子但誦此呪必能成就誦此呪人不須作法不求宿日不求持齊不須洗浴不須別衣但讀誦皆悉成就如經廣說根本印先合掌二中指少屈二頭指頭相柱二大指並直竪當心上誦七返散頂上之若有召請二大指來去由此呪及印契力故自身即如本尊威神威力諸大力魔不得便次心呪曰烏唵二合一鉢特摩二合二震多末尼平三啜羅二合四虎𤙖二合五次隨心呪曰嗚唵二合一嚩羅陀鉢特迷二合三企次以右手逆覆左手以右小指頭押左大指頭以右大指頭押左小指頭呪曰唵一阿唎耶二婆路圓平吉帝攝跋二合羅去音耶菩提薩埵去音耶摩訶薩埵去音耶五摩訶迦嚧尼迦去音耶二合哆姪他七唵者揭唎二合八同者揭唎九摩訶者揭𠼝者揭𠼝他去音𠼝十一者揭𠼝十二馱羅十三娑訶十四以印誦此呪三返散頂上馬頭觀音護身結界法印呪此法用三兩手從中指以下三指向外相叉各博著手背合掌二食指直竪相去五分許並二大指相著各屈一節勿著食指頭來去呪曰唵一鉢囉毗迦悉跢二跋折囉三涉囉上音支莎訶馬頭大法身印兩手食指以下三指向外相叉指頭各轉著手背合掌以二小指並竪相合並二大指相著屈怒大指來去呪曰唵一杜那杜那二摩他摩他三可馱可馱可馱訶那揭唎婆五嗚𤙖莎去音訶七馬頭法身印以二手食指以下四指向外相叉頭各著手背合掌並二大指相著各屈一節勿著食指大指來去呪曰唵一阿密唎都知二合婆去音嗚𤙖去音莎訶次結界馬頭觀音印作避除結界二手合掌二頭指二無名指屈入掌各相背並二大指微屈勿著頭指即誦馬頭明王呪曰唵阿密㗚二合妬納婆二合吽發吒娑嚩二合訶誦三返即以印左轉三匝避除一切諸魔皆自退散以印右旋三匝即成堅固大界已上護身之法亦用毗俱胝印地結觀世音菩薩毗俱胝地結法左右中指以下反叉掌中右押左指背搏掌以二大指敘竝相柱直竪屈二食指相搏甲相背以二大指柱地結呪唵一倍移跢知一嗚𤙖凡上根中根下根念誦具經列此法不出念誦法竟誦此呪諸智者得大安樂貨食必定成就富貴資具無不豐足凡三世諸佛出世皆說此呪此呪密不得妄說時露驗皆散去是故妄不可傳但阿闍梨可得若非爾傳自他共墮三途不簡淨不淨念誦具如上列若於女人懷中但讀誦必成大驗念誦之時當憶聖如意輪菩薩形相永作依怙若男若女人繫念誦此呪應以後夜亦晨朝未食之時應誦若千若百八遍隨意多少亦勿增減誦十三千遍得見一切諸佛菩薩大悲本尊此呪一切呪之中最尊最上念誦一遍其功德甚多何況每日誦其功德不可思若滿十萬亦世間出世皆悉成就現世所求資財寶穀米果實隨意成就若欲一切人所愛念皆能成就亦每日誦一千遍現世肉身往入初地位皆能融通速值遇諸佛如來疾得三菩提記畫像法若有衆生誦此呪應畫像其彩色中輒不得著膠唯用薰陸香汁為膠畫像人受八齊戒其菩薩形相造思惟之形有六臂其左上作金輪之手中手執蓮花下手按山右手作思惟相中手執如意珠下手執念珠以右足以三十二葉蓮花為坐頂上有化佛相好圓滿而乘月輪威光照耀如月中光又右邊畫馬頭忿怒大明王像威光熾然相好圓滿以上牙垂下如上畫像隨意大小觀世音菩薩如意摩尼輪陀羅尼念誦儀軌諸尊法依修兩界只行者心也但金剛界五相成身五處我為蓮花身者如意輪也誠雖舉五部中其一類擇云蓮花身可有其意歟仍金剛智三藏如意輪儀軌依金剛界故行人可向西云云縱依金剛界不可作大法如此別法者可修三摩地法依胎藏時者修隨行法但於別處獨身被修行者以金剛界唱禮五悔依十八道令修業之十八道是妙成就之軌也不知案內世人輕之尤笑仍不空三藏儀軌依十八道也自可密之至本尊印處者一切法先結大日印誦五字真言其次結當時本尊印者也是則先住大日法界宮隨檀越樂欲起大悲誓願出堂時本尊變化身成就施主心願之意也是大祕密口傳也護摩時被用心呪所謂唵𭊱娜摩振多摩抳入嚩囉吽讚迦摩攞是如意輪也王本尊面者一切佛菩薩金剛可依息災等法但至此法攝依受行人向西行宜歟前前人師多依此方修行也金剛佛子興然本
